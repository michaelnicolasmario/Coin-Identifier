
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CoinLens — AI Coin Identifier</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --gold-dim: #7a6228;
      --bg: #0c0b09;
      --bg2: #141210;
      --bg3: #1e1b16;
      --text: #f0e8d8;
      --text-dim: #8a7d68;
      --border: #2e2820;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: 0.4;
    }

    header {
      border-bottom: 1px solid var(--border);
      padding: 2rem 3rem;
      display: flex;
      align-items: baseline;
      gap: 1.5rem;
      background: linear-gradient(180deg, #0f0d0a 0%, transparent 100%);
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 900;
      color: var(--gold);
      letter-spacing: -0.02em;
    }

    .logo span {
      color: var(--text-dim);
      font-weight: 400;
    }

    .tagline {
      font-size: 0.7rem;
      color: var(--text-dim);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 4rem 2rem;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3rem;
      align-items: start;
    }

    @media (max-width: 768px) {
      main { grid-template-columns: 1fr; padding: 2rem 1rem; }
      header { padding: 1.5rem; }
    }

    .panel {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .panel-header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .panel-header::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 8px var(--gold);
    }

    /* Camera */
    .camera-wrap {
      position: relative;
      aspect-ratio: 4/3;
      background: #000;
      overflow: hidden;
    }

    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    #canvas { display: none; }

    .camera-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .reticle {
      width: 160px;
      height: 160px;
      position: relative;
    }

    .reticle::before, .reticle::after,
    .reticle span::before, .reticle span::after {
      content: '';
      position: absolute;
      width: 24px;
      height: 24px;
      border-color: var(--gold);
      border-style: solid;
      opacity: 0.7;
    }

    .reticle::before { top: 0; left: 0; border-width: 2px 0 0 2px; }
    .reticle::after  { top: 0; right: 0; border-width: 2px 2px 0 0; }
    .reticle span::before { bottom: 0; left: 0; border-width: 0 0 2px 2px; }
    .reticle span::after  { bottom: 0; right: 0; border-width: 0 2px 2px 0; }

    .camera-placeholder {
      width: 100%;
      aspect-ratio: 4/3;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      background: var(--bg3);
      color: var(--text-dim);
    }

    .coin-icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: 2px solid var(--gold-dim);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      color: var(--gold-dim);
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(201,168,76,0.2); }
      50% { box-shadow: 0 0 0 12px rgba(201,168,76,0); }
    }

    .camera-controls {
      padding: 1.2rem 1.5rem;
      display: flex;
      gap: 0.8rem;
      border-top: 1px solid var(--border);
    }

    button {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      border: none;
      border-radius: 1px;
      padding: 0.7rem 1.2rem;
      transition: all 0.15s ease;
    }

    .btn-primary {
      background: var(--gold);
      color: #0c0b09;
      font-weight: 500;
      flex: 1;
    }

    .btn-primary:hover { background: var(--gold-light); }
    .btn-primary:disabled { background: var(--gold-dim); cursor: not-allowed; opacity: 0.6; }

    .btn-secondary {
      background: transparent;
      color: var(--text-dim);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover { border-color: var(--gold-dim); color: var(--text); }

    /* Results */
    .result-body {
      padding: 1.5rem;
      min-height: 300px;
    }

    .result-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 260px;
      gap: 0.8rem;
      color: var(--text-dim);
      font-size: 0.75rem;
      letter-spacing: 0.05em;
      text-align: center;
    }

    .result-empty .big { font-size: 2.5rem; opacity: 0.3; }

    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 260px;
      gap: 1.5rem;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 2px solid var(--border);
      border-top-color: var(--gold);
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      font-size: 0.7rem;
      color: var(--text-dim);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .result-content {
      font-size: 0.82rem;
      line-height: 1.8;
      color: var(--text);
      white-space: pre-wrap;
    }

    .result-content strong, .result-label {
      color: var(--gold);
      font-weight: 500;
    }

    .captured-preview {
      width: 100%;
      border-radius: 1px;
      margin-bottom: 1.2rem;
      border: 1px solid var(--border);
      display: none;
    }

    .status-bar {
      padding: 0.6rem 1.5rem;
      border-top: 1px solid var(--border);
      font-size: 0.65rem;
      color: var(--text-dim);
      letter-spacing: 0.1em;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .status-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--text-dim);
    }

    .status-dot.active { background: #4caf82; box-shadow: 0 0 6px #4caf82; }
    .status-dot.analyzing { background: var(--gold); box-shadow: 0 0 6px var(--gold); animation: blink 1s ease infinite; }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .hero-text {
      grid-column: 1 / -1;
      text-align: center;
      padding-bottom: 1rem;
    }

    .hero-text h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 900;
      line-height: 1.1;
      color: var(--text);
      margin-bottom: 0.8rem;
    }

    .hero-text h1 em {
      color: var(--gold);
      font-style: normal;
    }

    .hero-text p {
      color: var(--text-dim);
      font-size: 0.8rem;
      letter-spacing: 0.05em;
    }

    .divider {
      width: 60px;
      height: 1px;
      background: var(--gold-dim);
      margin: 1rem auto;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">Coin<span>Lens</span></div>
  <div class="tagline">AI-Powered Numismatic Identification</div>
</header>

<main>
  <div class="hero-text">
    <h1>Identify Any Coin<br/>in <em>Seconds</em></h1>
    <div class="divider"></div>
    <p>Point your camera at a coin — our AI identifies the type, origin, year, and value</p>
  </div>

  <!-- Camera Panel -->
  <div class="panel">
    <div class="panel-header">Live Camera</div>

    <div id="cameraPlaceholder" class="camera-placeholder">
      <div class="coin-icon">🪙</div>
      <span>Camera not started</span>
    </div>

    <div class="camera-wrap" id="cameraWrap" style="display:none">
      <video id="video" autoplay playsinline muted></video>
      <div class="camera-overlay"><div class="reticle"><span></span></div></div>
      <canvas id="canvas"></canvas>
    </div>

    <div class="camera-controls">
      <button class="btn-secondary" id="btnStart" onclick="startCamera()">Start Camera</button>
      <button class="btn-primary" id="btnCapture" onclick="capture()" disabled>Capture & Identify</button>
    </div>

    <div class="status-bar">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Camera inactive</span>
    </div>
  </div>

  <!-- Results Panel -->
  <div class="panel">
    <div class="panel-header">Analysis Result</div>
    <div class="result-body" id="resultBody">
      <div class="result-empty">
        <div class="big">◎</div>
        <div>No coin analyzed yet</div>
        <div style="opacity:0.6">Start camera and capture a coin to begin</div>
      </div>
    </div>
  </div>
</main>

<script>
  let stream = null;

  async function startCamera() {
    try {
      stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 960 } } });
      const video = document.getElementById('video');
      video.srcObject = stream;
      document.getElementById('cameraPlaceholder').style.display = 'none';
      document.getElementById('cameraWrap').style.display = 'block';
      document.getElementById('btnCapture').disabled = false;
      document.getElementById('btnStart').textContent = 'Restart';
      setStatus('active', 'Camera active — position coin in frame');
    } catch (e) {
      setStatus('', 'Camera access denied: ' + e.message);
    }
  }

  function capture() {
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video, 0, 0);
    const imageData = canvas.toDataURL('image/jpeg', 0.92);
    analyzeImage(imageData);
  }

  async function analyzeImage(imageData) {
    setStatus('analyzing', 'Analyzing coin...');
    document.getElementById('btnCapture').disabled = true;

    document.getElementById('resultBody').innerHTML = `
      <img src="${imageData}" class="captured-preview" id="preview" style="display:block"/>
      <div class="loading">
        <div class="spinner"></div>
        <div class="loading-text">Consulting AI...</div>
      </div>`;

    try {
      const res = await fetch('/identify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ image: imageData })
      });

      const data = await res.json();

      if (data.error) {
        showError(data.error, imageData);
      } else {
        showResult(data.result, imageData);
      }
    } catch (e) {
      showError('Network error: ' + e.message, imageData);
    }

    document.getElementById('btnCapture').disabled = false;
    setStatus('active', 'Ready — capture another coin');
  }

  function showResult(text, imageData) {
    document.getElementById('resultBody').innerHTML = `
      <img src="${imageData}" class="captured-preview" style="display:block; max-height:180px; object-fit:cover"/>
      <div class="result-content">${escapeHtml(text)}</div>`;
    setStatus('active', 'Analysis complete');
  }

  function showError(msg, imageData) {
    document.getElementById('resultBody').innerHTML = `
      ${imageData ? `<img src="${imageData}" class="captured-preview" style="display:block; max-height:180px; object-fit:cover"/>` : ''}
      <div class="result-empty">
        <div class="big" style="color:#c0392b">✕</div>
        <div style="color:#c0392b">Error</div>
        <div style="opacity:0.7">${escapeHtml(msg)}</div>
      </div>`;
    setStatus('', 'Error occurred');
  }

  function setStatus(type, text) {
    const dot = document.getElementById('statusDot');
    dot.className = 'status-dot' + (type ? ' ' + type : '');
    document.getElementById('statusText').textContent = text;
  }

  function escapeHtml(t) {
    return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
</html>
